<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Mărțișor pentru tine ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom right, #ffdde1, #ee9ca7);
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            color: #b30000;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 500px;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        p {
            font-size: 20px;
        }

        img {
            width: 200px;
            margin-top: 20px;
        }

        .string {
            width: 200px;
            height: 8px;
            margin: 10px auto;
            background: repeating-linear-gradient(
                90deg,
                red 0px,
                red 10px,
                white 10px,
                white 20px
            );
            border-radius: 10px;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: scale(0.9);}
            to {opacity: 1; transform: scale(1);}
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🌹 Mărțișorul meu pentru tine 🌹</h1>
    <p>
        Iubirea mea,<br><br>
        Așa cum firul alb și roșu se împletesc,  
        la fel se împletesc și inimile noastre. ❤️  
        Îți ofer acest mărțișor virtual,  
        dar sentimentele sunt cât se poate de reale.
    </p>

    <div class="string"></div>

    <img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23" alt="Trandafir roșu">

    <p><strong>Te iubesc! 🌷</strong></p>
</div>

</body>
</html>
